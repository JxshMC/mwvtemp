config-version: 2
debug: false

# Command Whitelist (Master — synced to all Paper backends via minewar:sync)
command-whitelist:
  enabled: true
  per-permission: true
  bypass-permission: "minewar.admin.tab"
  # Servers listed here bypass all tab-complete filtering entirely.
  # Players on these servers see all commands and suggestions unfiltered.
  disabled-servers: []
  allowed:
  - spawn
  - buildmode
  - bm
  - coinflip
  - cf
  - fly
  - minewarutils
  - mu
  - help
  - server
  - play
  - hub
  - lobby
  - msg
  - message
  - reply
  - r
  - ignore
  - block
  - unblock
  - unignore
  - minewarvelocity
  - mwv
  - mwu
  - find
  - seen
  - whereis
  - lastlogin
  - lastseen
  - tpa
  - tpaccept
  - tpdeny
  - tpcancel
  - discord
  - flyspeed
  - msgtoggle
  - togglepm

# Global Feature Toggles
modules:
  discord-sync:
    enabled: true
    channel_id: "YOUR_SYNC_CHANNEL_ID"
    webhook_url: "YOUR_WEBHOOK_URL_HERE"
  auto-vanish:
    enabled: true
  aliases:
    enabled: true
  alert-logging:
    enabled: true
  private-messaging:
    enabled: true
  vanish:
    enabled: true
  seen-tracking:
    enabled: true
  first-join-tracking:
    enabled: true
  ignore-system:
    enabled: true

# Restart Configuration
ProxyRestart:
  defaultRestartTime: 600
  broadcastIntervals:
    - 600
    - 300
    - 60
    - 30
    - 10
    - 5
    - 4
    - 3
    - 2
    - 1

# Navigation
Servers:
  # List of servers to show in the custom /server GUI/List
  - "Hub"
  - "Survival"

slashserver:
  # Command alias -> Target Server
  hub: "hub"
  survival: "survival"
  staff: "staff"

