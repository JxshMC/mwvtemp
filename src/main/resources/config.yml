# Command Aliases (New Structure)
Commands:
  seen:
    aliases: ["check", "playerinfo", "lastlogin"]
    enabled: true
  firstjoin:
    aliases: ["fj"]
    enabled: true
  list:
    aliases: ["online", "players", "glist", "who"]
    enabled: true
  staffchat:
    aliases: ["sc", "s"]
    enabled: true
  msg:
    aliases: ["w", "m", "tell", "whisper", "pm"]
    enabled: true
  reply:
    aliases: ["r"]
    enabled: true
  adminreply:
    aliases: ["ar", "radmin", "ra"]
    enabled: true
  msgtoggle:
    aliases: ["pms", "togglepm", "msgtoggle"]
    enabled: true
  socialspy:
    aliases: ["spy"]
    enabled: true
  ignore:
    aliases: ["block"]
    enabled: true
  unignore:
    aliases: ["unblock"]
    enabled: true
  vanish:
    aliases: ["v"]
    enabled: true
  alert:
    aliases: ["broadcast", "bc"]
    enabled: true
  find:
    aliases: ["whereis"]
    enabled: true
  proxy_restart:
    aliases: ["prestart"]
    enabled: true
  server_command:
    aliases: ["srv"]
    enabled: true
  minewarvelocity:
    aliases: ["mwvelocity", "velocityutils", "mwv"]
    enabled: true
  whois:
    aliases: ["userinfo"] # Careful with msg "m" and whois "w"
    enabled: true
  discord:
    aliases: ["link"]
    enabled: true
  adminmessage:
    aliases: ["am", "adminmsg", "msgadmin", "ma"]
    enabled: true
  balert:
    aliases: ["consolealert"]
    enabled: true


# Chat & Formatting
global-chat:
  enabled: true
  first-join-broadcast-enabled: true

# Permissions
permissions:
  seen: "minewar.seen"
  find: "minewar.find"
  staffchat: "minewar.staffchat"
  staffchat_use: "minewar.staffchat.use"
  staffchat_see: "minewar.staffchat.see"
  discord_users: "minewar.discord.users"
  msg: "minewar.msg"
  reply: "minewar.reply"
  socialspy: "minewar.socialspy"
  whois: "minewar.discord.whois"
  discord_link: "minewar.discord.link"
  discord_unlink: "minewar.discord.unlink"
  msg_toggle: "minewar.msgtoggle"
  ignore: "minewar.ignore"
  firstjoin: "minewar.firstjoin"
  alert: "minewar.alert"
  alert_reload: "minewar.alert.reload"
  vanish: "minewar.vanish"
  vanish_admins: "minewar.vanish.admins"
  vanish_see: "minewar.vanish.see"
  vanish_admins_see: "minewar.vanish.admins.see"
  vanish_auto: "minewar.vanish.auto"
  list: "minewar.list"
  list_staff: "minewar.list.staff"
  server_command: "minewar.server" # Custom Server List
  slash_server: "minewar.slashserver" # Permission for /plots, /survival etc
  proxy_restart: "minewar.restart"
  proxy_restart_cancel: "minewar.restart.cancel"
  minewarvelocity_base: "minewarvelocity.base"
  minewarvelocity_reload: "minewarvelocity.reload"
  adminmessage: "minewar.adminmessage"
  adminreply: "minewarvelocity.adminreply"
  global_chat: "minewar.chat.global"
  owner_chat: "minewar.chat.owner"

# Storage Settings
storage:
  storage-type: H2 # H2 or MARIADB

  # NUCLEAR RESET (Migration v3)
  # Set to true to TRUNCATE seen_data on next startup.
  # Once the truncation runs, a lock flag (migration_v3_complete) is written to
  # plugin_metadata and the reset will NEVER run again, even if this stays true.
  # Default: false (safe — no data is ever deleted unless you explicitly set this).
  confirm-nuclear-reset: false

  mariadb:
    host: "localhost"
    port: 3306
    database: "minecraft"
    username: "root"
    password: "password"
